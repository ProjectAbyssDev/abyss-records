name: Generate ABYSS Record

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate record
        run: |
          node <<'EOF'

          const fs = require("fs")
          const puppeteer = require("puppeteer")

          const node = process.env.NODE_ID || "test-node"

          const recordDir = `record/${node}`

          fs.mkdirSync(recordDir,{recursive:true})

          const template = fs.readFileSync("templates/card.html","utf8")

          const html = template.replace("{{NODE}}",node)

          fs.writeFileSync(`${recordDir}/card.html`,html)

          ;(async()=>{

          const browser = await puppeteer.launch({
  args: ['--no-sandbox','--disable-setuid-sandbox']
})

          const page = await browser.newPage()

          await page.goto("file://" + process.cwd() + "/" + recordDir + "/card.html")

          await page.setViewport({width:1200,height:630})

          await page.screenshot({
            path:`${recordDir}/card.png`
          })

          await browser.close()

          })()

          const pageTemplate = fs.readFileSync("templates/page.html","utf8")
            .replaceAll("{{NODE}}",node)

          fs.writeFileSync(`${recordDir}/index.html`,pageTemplate)

          EOF

      - name: Commit files
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add record
          git commit -m "Generate record"
          git push
